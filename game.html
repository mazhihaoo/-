<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>余震 · DROP</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
  #app{position:fixed;inset:0}
  #crosshair{position:fixed;left:50%;top:50%;width:6px;height:6px;margin:-3px;border-radius:50%;background:rgba(255,255,255,.5);z-index:11;opacity:0;transition:opacity .4s}
  #ctrl{position:fixed;left:24px;bottom:20px;color:rgba(255,255,255,.5);font-size:14px;line-height:1.7;z-index:11;opacity:0;transition:opacity .5s;text-shadow:0 1px 4px #000}
  #ctrl b{color:#fff}
  #sub{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;color:#e8e2d6;font-size:26px;letter-spacing:4px;line-height:1.8;text-shadow:0 2px 12px #000;opacity:0;transition:opacity 1.4s;max-width:80%;white-space:pre-line;z-index:12}
  #obj{position:fixed;left:50%;top:8%;transform:translateX(-50%);color:#ffdf5a;font-size:20px;font-weight:700;letter-spacing:1px;text-shadow:0 0 14px #000,0 0 8px #c80;opacity:0;transition:opacity .3s;z-index:12;max-width:84%;text-align:center}
  #pause{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:25;display:none;align-items:center;justify-content:center;color:#fff;font-size:22px;letter-spacing:3px;cursor:pointer}
  #start{position:fixed;inset:0;background:#0a0908;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
  #start h1{color:#e8e2d6;font-size:60px;letter-spacing:18px;font-weight:900}
  #start .s{color:#7a7468;font-size:16px;letter-spacing:3px}
  #startBtn{background:none;border:1px solid #6a4;color:#9c6;padding:15px 46px;font-size:20px;letter-spacing:6px;border-radius:8px;cursor:pointer;transition:all .2s}
  #startBtn:hover{background:#9c6;color:#0a0908}
  #start .h2{color:#555;font-size:13px;line-height:1.8;text-align:center}
</style>
<script>
// 错误捕获条(隔空 debug 用)
function showErr(m){var b=document.getElementById('errbox');if(!b){b=document.createElement('div');b.id='errbox';b.style.cssText='position:fixed;left:0;right:0;top:0;z-index:99999;background:#a00;color:#fff;font:13px monospace;padding:10px;white-space:pre-wrap';(document.body||document.documentElement).appendChild(b)}b.textContent+='❌ '+m+'\n'}
addEventListener('error',e=>showErr((e.message||(e.target&&e.target.src)||'load fail')+' @'+String(e.filename||'').split('/').pop()+':'+(e.lineno||'')),true);
addEventListener('unhandledrejection',e=>showErr('Promise: '+(e.reason&&e.reason.message||e.reason)));
</script>
</head>
<body>
<div id="app"></div>
<div id="crosshair"></div>
<div id="sub"></div>
<div id="obj"></div>
<div id="ctrl"><b>WASD</b> 走动　·　<b>鼠标</b> 环顾　·　<b>ESC</b> 松开鼠标</div>
<div id="pause">已暂停　·　点击屏幕继续</div>
<div id="start"><h1>DROP</h1><div class="s">余 震 · 地 震 逃 生</div><button id="startBtn">▶ 进 入</button><div class="h2">建议戴耳机 · 进入后 WASD 走动、鼠标环顾<br>你将在二楼卧室醒来</div></div>

<script type="importmap">
{ "imports": { "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" }}
</script>
<script type="module">
// ============================================================
// 余震·DROP — 完整游戏（块1：卧室场景 + 第一人称自由移动 + 醒来开场 + 地震）
// 质感用程序化纹理(零文件)；几何全代码生成；守 8MB 离线。
// ============================================================
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ---------- 程序化纹理（Canvas 画 noise/污渍/裂纹，零文件）----------
function noiseTex(base,opt={}){
  const s=256,c=document.createElement('canvas');c.width=c.height=s;const x=c.getContext('2d');
  x.fillStyle=base;x.fillRect(0,0,s,s);
  const im=x.getImageData(0,0,s,s),d=im.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*(opt.grain||32);d[i]+=n;d[i+1]+=n;d[i+2]+=n;}
  x.putImageData(im,0,0);
  for(let i=0;i<(opt.stains||14);i++){const r=20+Math.random()*60,g=x.createRadialGradient(Math.random()*s,Math.random()*s,0,Math.random()*s,Math.random()*s,r);
    g.addColorStop(0,'rgba(0,0,0,'+(0.04+Math.random()*0.09)+')');g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.fillRect(0,0,s,s);}
  for(let i=0;i<(opt.cracks||4);i++){x.strokeStyle='rgba(22,19,16,'+(0.3+Math.random()*0.4)+')';x.lineWidth=0.5+Math.random()*1.4;x.beginPath();
    let px=Math.random()*s,py=Math.random()*s;x.moveTo(px,py);for(let j=0;j<8;j++){px+=(Math.random()-0.5)*40;py+=(Math.random()-0.5)*40;x.lineTo(px,py);}x.stroke();}
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(opt.rep||2,opt.rep||2);return t;
}
function bumpTex(){const s=256,c=document.createElement('canvas');c.width=c.height=s;const x=c.getContext('2d');
  x.fillStyle='#8080ff';x.fillRect(0,0,s,s);const im=x.getImageData(0,0,s,s),d=im.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*50;d[i]=128+n;d[i+1]=128+n;d[i+2]=255;}
  x.putImageData(im,0,0);const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(3,3);return t;}

// ---------- 渲染器 / 场景 / 相机 ----------
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.35;app.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x9ca1a6);scene.fog=new THREE.Fog(0x8f9499,10,32);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.05,100);

// ---------- 光照 ----------
scene.add(new THREE.AmbientLight(0xbcc4cc,0.8));
scene.add(new THREE.HemisphereLight(0xd2d8de,0x5a5248,0.6));
const sun=new THREE.DirectionalLight(0xeaf2fa,2.0);sun.position.set(8,7,5);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-12;sun.shadow.camera.right=12;sun.shadow.camera.top=12;sun.shadow.camera.bottom=-12;sun.shadow.bias=-0.0004;scene.add(sun);

// ---------- 程序化 PBR 材质 ----------
const bump=bumpTex();
const mWall =new THREE.MeshStandardMaterial({color:0xcac8c2,roughness:.95,map:noiseTex('#cac8c2',{rep:3,cracks:6,stains:18}),normalMap:bump,normalScale:new THREE.Vector2(.4,.4)});
const mWallD=new THREE.MeshStandardMaterial({color:0xa8a39a,roughness:1,  map:noiseTex('#a8a39a',{rep:3,cracks:8,stains:20}),normalMap:bump,normalScale:new THREE.Vector2(.5,.5)});
const mFloor=new THREE.MeshStandardMaterial({color:0xa6987f,roughness:.82, map:noiseTex('#a6987f',{rep:4,grain:24,stains:14})}); // 木地板色
const mCeil =new THREE.MeshStandardMaterial({color:0xc2c0ba,roughness:1,  map:noiseTex('#c2c0ba',{rep:3,cracks:5,stains:14}),normalMap:bump,normalScale:new THREE.Vector2(.4,.4)});
const mWood =new THREE.MeshStandardMaterial({color:0x6b5640,roughness:.78, map:noiseTex('#6b5640',{rep:2,grain:26,cracks:2})});
const mSheet=new THREE.MeshStandardMaterial({color:0xb8b2a6,roughness:.9,  map:noiseTex('#b8b2a6',{rep:2,grain:20,stains:8})}); // 床单
const mMetal=new THREE.MeshStandardMaterial({color:0x8a9098,roughness:.42,metalness:.7});
function box(w,h,d,m,x,y,z,rx,ry,rz){const e=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);e.position.set(x,y,z);if(rx||ry||rz)e.rotation.set(rx||0,ry||0,rz||0);e.castShadow=true;e.receiveShadow=true;scene.add(e);return e;}

// ============================================================
// 二楼卧室（玩家在床上醒来）—— 房间约 8×7，门口通向走廊/楼梯（块4 接）
// ============================================================
const ROOM={w:8,d:7,h:3};
box(ROOM.w,0.3,ROOM.d,mFloor,0,0,0);                 // 地板
box(ROOM.w,0.2,ROOM.d,mCeil,0,ROOM.h,0);             // 天花板
box(ROOM.w,ROOM.h,0.3,mWallD,0,ROOM.h/2,-ROOM.d/2);  // 后墙(床头)
box(0.3,ROOM.h,ROOM.d,mWall,-ROOM.w/2,ROOM.h/2,0);   // 左墙(开窗)
box(0.3,ROOM.h,ROOM.d,mWall, ROOM.w/2,ROOM.h/2,0);   // 右墙
// 前墙(带门洞通走廊) — 用两段墙+门楣留出门洞
box(2.6,ROOM.h,0.3,mWall,-1.4,ROOM.h/2,ROOM.d/2);    // 前墙左段
box(2.6,ROOM.h,0.3,mWall, 1.9,ROOM.h/2,ROOM.d/2);    // 前墙右段
box(1.6,0.6,0.3,mWall,0.25,2.7,ROOM.d/2);            // 门楣
// 窗(左墙，透进晨光) + 框
const sky=new THREE.Mesh(new THREE.PlaneGeometry(2.6,1.8),new THREE.MeshBasicMaterial({color:0xe8eef4}));sky.position.set(-3.83,1.7,-1);sky.rotation.y=Math.PI/2;scene.add(sky);
box(0.32,0.16,2.8,mWall,-3.85,2.65,-1);box(0.32,0.16,2.8,mWall,-3.85,0.75,-1);box(0.32,1.9,0.16,mWall,-3.85,1.7,-2.4);box(0.32,1.9,0.16,mWall,-3.85,1.7,0.4);

// ---- 床（玩家初始位置就在床上）----
const BED={x:0,z:-2.1};
box(2.1,0.45,1.0,mWood,BED.x,0.45,BED.z);            // 床架
box(2.0,0.22,0.95,mSheet,BED.x,0.78,BED.z);          // 床垫
box(0.7,0.18,0.5,mSheet,BED.x-0.6,0.95,BED.z-0.25);  // 枕头
// 床头柜 + 台灯
box(0.6,0.6,0.5,mWood,BED.x+1.5,0.3,BED.z);
const lamp=box(0.18,0.35,0.18,mMetal,BED.x+1.5,0.78,BED.z);
const lampGlow=new THREE.PointLight(0xffd9a0,3,4,2);lampGlow.position.set(BED.x+1.5,0.95,BED.z);scene.add(lampGlow);
// 衣柜（高大家具，块2 会让它倒下成为危险）
const wardrobe=box(1.6,2.4,0.6,mWood,2.6,1.2,-2.6);
// 书桌 + 椅子
box(1.4,0.1,0.7,mWood,-2.6,1.0,2);box(0.1,1,0.1,mWood,-3.2,0.5,1.7);box(0.1,1,0.1,mWood,-2.0,0.5,2.3);
box(0.5,0.5,0.5,mWood,-2.6,0.3,1.3);

// ---- 天花板碎块(块2 会掉落，这里先藏起来)----
const debris=[];
for(let i=0;i<14;i++){const s=0.18+Math.random()*0.3;const dd=box(s,s*0.5,s*0.8,mCeil,(Math.random()-0.5)*6,ROOM.h-0.2,(Math.random()-0.5)*5);dd.visible=false;dd.userData.vy=0;debris.push(dd);}

// ---- 灰尘 ----
const dg=new THREE.BufferGeometry();const NP=140;const pa=new Float32Array(NP*3);
for(let i=0;i<NP;i++){pa[i*3]=(Math.random()-0.5)*7;pa[i*3+1]=Math.random()*3;pa[i*3+2]=(Math.random()-0.5)*6;}
dg.setAttribute('position',new THREE.BufferAttribute(pa,3));
const dust=new THREE.Points(dg,new THREE.PointsMaterial({color:0xc8ccd0,size:0.013,transparent:true,opacity:0,depthWrite:false}));scene.add(dust);

// ---------- 后处理 ----------
const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.4,0.6,0.86));
const Grade={uniforms:{tDiffuse:{value:null},t:{value:0},r:{value:1.5},s:{value:0.4}},
 vertexShader:`varying vec2 v;void main(){v=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`uniform sampler2D tDiffuse;uniform float t;uniform float r;uniform float s;varying vec2 v;
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
  void main(){vec2 uv=v;float ca=0.0014;vec4 c;c.r=texture2D(tDiffuse,uv+vec2(ca,0.)).r;c.g=texture2D(tDiffuse,uv).g;c.b=texture2D(tDiffuse,uv-vec2(ca,0.)).b;c.a=1.;
   float d=distance(uv,vec2(0.5));c.rgb*=smoothstep(r,r-s,d);c.rgb+=(rnd(uv+t)-0.5)*0.045;c.rgb=mix(c.rgb,c.rgb*vec3(0.97,1.0,1.04),0.5);gl_FragColor=c;}`};
const grade=new ShaderPass(Grade);composer.addPass(grade);composer.addPass(new OutputPass());

// ============================================================
// 第一人称控制 + 状态机
// ============================================================
const EYE=1.6, BED_EYE=0.95; // 躺床上视角低
let phase='start', t=0, shake=0, camY=BED_EYE;
const player=new THREE.Vector3(BED.x,EYE,BED.z+0.3); // 醒来后站床边
let yaw=Math.PI,pitch=0,locked=false;const keys={}; // 初始朝向房间内/门口(+z)，醒来就能看到房间
const clock=new THREE.Clock();
const $=id=>document.getElementById(id);

renderer.domElement.addEventListener('click',()=>{if(phase!=='start'&&!locked)lockP();});
function lockP(){const el=renderer.domElement;if(!el.requestPointerLock)return;const p=el.requestPointerLock();if(p&&p.catch)p.catch(()=>{});}
document.addEventListener('pointerlockchange',()=>{locked=(document.pointerLockElement===renderer.domElement);$('pause').style.display=(!locked&&(phase==='calm'||phase==='quake'))?'flex':'none';});
document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*0.0022;pitch-=e.movementY*0.0022;pitch=Math.max(-1.4,Math.min(1.4,pitch));});
$('pause').addEventListener('click',lockP);
addEventListener('keydown',e=>keys[e.code]=true);addEventListener('keyup',e=>keys[e.code]=false);

function sub(x){$('sub').textContent=x;$('sub').style.opacity=1;}function hideSub(){$('sub').style.opacity=0;}

// ---- WebAudio 地鸣 ----
let ac=null,rg=null;
function initAudio(){try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  rg=ac.createGain();rg.gain.value=0;rg.connect(ac.destination);
  const o=ac.createOscillator();o.type='sine';o.frequency.value=42;o.connect(rg);o.start();
  const n=ac.createBufferSource();const b=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate);const d=b.getChannelData(0);let l=0;
  for(let i=0;i<d.length;i++){const w=Math.random()*2-1;d[i]=(l+0.02*w)/1.02;l=d[i];d[i]*=3.3;}
  n.buffer=b;n.loop=true;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=180;n.connect(f);f.connect(rg);n.start();}
function rumble(v){if(rg)rg.gain.setTargetAtTime(v,ac.currentTime,0.3);}
function crash(){if(!ac)return;const s=ac.createBufferSource(),g=ac.createGain();const b=ac.createBuffer(1,ac.sampleRate*0.6,ac.sampleRate);const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);s.buffer=b;s.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime(0.7,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.6);s.start();}

// ---- 流程 ----
$('startBtn').onclick=()=>{initAudio();$('start').style.opacity=0;setTimeout(()=>$('start').style.display='none',400);lockP();begin();};
function begin(){phase='wake';camY=BED_EYE;$('crosshair').style.opacity=1;$('ctrl').style.opacity=1;
  sub('凌晨 4:12……\n你在睡梦中。');setTimeout(hideSub,2600);
  setTimeout(()=>{phase='calm';camY=EYE;sub('… 走动看看,门在前方 …');setTimeout(hideSub,2200);},3200);
  setTimeout(()=>beginQuake(),7000);}
function beginQuake(){phase='quake';crash();rumble(0.9);
  $('obj').textContent='⚠ 地震了!想办法活下去——往哪躲?往哪逃?';$('obj').style.opacity=1;
  debris.forEach(d=>{d.visible=true;d.userData.vy=0;});dust.material.opacity=0.18;}

// 调试钩子(CDP 自验证)
window.__g=()=>({phase,player:player.toArray().map(v=>+v.toFixed(1)),shake:+shake.toFixed(2)});
window.__dbg=c=>{if(c==='quake'){$('start').style.display='none';phase='calm';camY=EYE;beginQuake();}composer.render();return 'ok';};

// ---------- 主循环 ----------
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);t+=dt;
  const moving=(keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'])&&(phase==='calm'||phase==='quake');
  if(moving){const sp=3.2*dt;const e=new THREE.Euler(0,yaw,0,'YXZ');const fwd=new THREE.Vector3(0,0,-1).applyEuler(e),rgt=new THREE.Vector3(1,0,0).applyEuler(e);
    if(keys['KeyW'])player.addScaledVector(fwd,sp);if(keys['KeyS'])player.addScaledVector(fwd,-sp);if(keys['KeyA'])player.addScaledVector(rgt,-sp);if(keys['KeyD'])player.addScaledVector(rgt,sp);
    player.x=Math.max(-ROOM.w/2+0.5,Math.min(ROOM.w/2-0.5,player.x));player.z=Math.max(-ROOM.d/2+0.5,Math.min(ROOM.d/2-0.5,player.z));}
  // 醒来时相机从床上低视角升起到站立
  const ty=(phase==='wake')?BED_EYE:EYE;camY+=(ty-camY)*Math.min(dt*2,1);
  // 地震晃动
  let tg=phase==='quake'?0.4:0;tg*=moving?1.4:0.7;shake+=(tg-shake)*Math.min(dt*4,1);const s=shake;
  camera.position.set(player.x+Math.sin(t*37)*0.05*s,camY+Math.cos(t*43)*0.045*s,player.z+Math.sin(t*29)*0.04*s);
  camera.rotation.order='YXZ';camera.rotation.y=yaw+Math.cos(t*27)*0.015*s;camera.rotation.x=pitch+Math.sin(t*31)*0.015*s;camera.rotation.z=Math.sin(t*53)*0.04*s;
  // 灯/碎块
  if(phase==='quake'){lampGlow.intensity=Math.random()<0.15?0.5:3;
    debris.forEach(d=>{if(d.visible){d.userData.vy-=dt*9;d.position.y+=d.userData.vy*dt;d.rotation.x+=dt*2;d.rotation.z+=dt*3;if(d.position.y<0.12){d.position.y=0.12;d.userData.vy*=-0.3;}}});}
  dust.rotation.y=t*0.02;grade.uniforms.t.value=t;
  composer.render();}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
