  return new THREE.CanvasTexture(c);
}
const sign=new THREE.Mesh(new THREE.PlaneGeometry(1.1,0.55), new THREE.MeshStandardMaterial({map:makeSignTexture(),roughness:0.8}));
sign.position.set(0, landY+1.5, zBack+0.16);     // 挂在井道深端墙上、转折平台上方，俯视下行时正好看见
world.add(sign);

// 顶部沿墙走的管线（黑铁管，增加工业 SCP 感），贴天花板下方
for(let i=0;i<2;i++){
  const pipe=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,zSpan,10), new THREE.MeshStandardMaterial({color:0x4a4d4f,roughness:0.5,metalness:0.7}));
  pipe.castShadow=true;
  pipe.rotation.x=Math.PI/2;
  pipe.position.set(-(ROOM_W/2-0.35)+i*0.25, ceilY-0.35, zMid);
  world.add(pipe);
}

// 地上散落的碎屑（小水泥块，收容失效后的破败）
for(let i=0;i<24;i++){
  const s=0.04+Math.random()*0.08;
  const deb=new THREE.Mesh(new THREE.BoxGeometry(s,s*0.6,s*1.2), stepMat);
  deb.castShadow=true; deb.receiveShadow=true;
  deb.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
  // 撒在各平台上
  const onTop=Math.random();
  if(onTop<0.4){ deb.position.set((Math.random()-0.5)*(ROOM_W-1), TOP_Y+s/2, flight1TopZ+0.9+(Math.random()-0.5)*1.4); }
  else if(onTop<0.7){ deb.position.set((Math.random()-0.5)*(ROOM_W-1), landY+s/2, landZ+(Math.random()-0.5)*1.4); }
  else { deb.position.set((Math.random()-0.5)*(ROOM_W-1), botY+s/2, botZ+(Math.random()-0.5)*1.4); }
  world.add(deb);
}

/* ============================================================================
   四、灯光：明亮但压抑（SCP 灵魂）—— 强环境光 + 顶部主光 + 应急灯点缀
   ============================================================================ */
// 强环境光：保证每个角落都看得清，不死黑（封闭井道里这是主照明，必须够强）
scene.add(new THREE.AmbientLight(0xc8ccca, 1.05));
// 半球光：天花板冷白 / 地面暖灰，模拟井道漫反射，把光「灌」到楼梯深处
scene.add(new THREE.HemisphereLight(0xe6ebe8, 0x7a7770, 0.85));
// 井道内向下的柔和补光（不投阴影）—— 专门照亮被天花板挡住的下行楼梯，杜绝越下越黑
const wellFill=new THREE.DirectionalLight(0xeef2f0, 0.85);
wellFill.position.set(0, 12, -3); wellFill.target.position.set(0, -2, landZ);
scene.add(wellFill); scene.add(wellFill.target);

// 主方向光：从上方斜射，投出栏杆/台阶的清晰阴影（结构立体感的来源；强度适中避免阴影把下行楼梯压黑）
const sun=new THREE.DirectionalLight(0xf2f4f1, 0.85);
sun.position.set(3.5, 9, 2);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5; sun.shadow.camera.far=40;
sun.shadow.camera.left=-8; sun.shadow.camera.right=8;
sun.shadow.camera.top=8; sun.shadow.camera.bottom=-8;
sun.shadow.bias=-0.0004;
sun.shadow.normalBias=0.02;
scene.add(sun);

// 嵌顶日光灯（冷白长条灯管 + 点光源，是井道主照明，把光灌到楼梯每一级）
function tubeLight(x,z,y){
  const tube=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.07,0.18), new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xeef4ff,emissiveIntensity:1.8}));
  tube.position.set(x, y, z);              // 吊在天花板下方，灯管可见
  world.add(tube);
  const l=new THREE.PointLight(0xeaf2ff, 1.6, 18, 1.5);
  l.position.set(x, y-0.2, z);
  scene.add(l);
}
// 顶层上方 + 井道中段 + 转折平台上方各一盏，确保整条楼梯都亮
tubeLight(0, flight1TopZ+0.6, ceilY-0.15);
tubeLight(0, (flight1TopZ+f1.endZ)/2, ceilY-0.15);
tubeLight(0, landZ, ceilY-0.15);
// 深端补光：照亮井道尽头的后墙 + 转折平台，避免背景一片灰murk
const backFill=new THREE.PointLight(0xe8eef0, 1.0, 14, 1.6);
backFill.position.set(0, landY+1.6, zBack+1.2);
scene.add(backFill);

// 应急灯（暗红小灯，SCP 收容失效标志，点缀但不压暗主调）
const emLight=new THREE.PointLight(0xff3b22, 0.6, 5, 2);
emLight.position.set((ROOM_W/2-0.25), landY+1.8, landZ);
scene.add(emLight);
const emBox=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.1,0.1), new THREE.MeshStandardMaterial({color:0x551510,emissive:0xff2a14,emissiveIntensity:2.2}));
emBox.position.set((ROOM_W/2-0.12), landY+1.85, landZ);
world.add(emBox);

return {spawn:{x:xLeft*0.5,y:1.62,z:flight1TopZ+1.1,yaw:0,pitch:-0.34}};
}

$('pause').addEventListener('click',lockP);
addEventListener('keydown',e=>keys[e.code]=true);addEventListener('keyup',e=>keys[e.code]=false);
function sub(x){$('sub').textContent=x;$('sub').style.opacity=1;}function hideSub(){$('sub').style.opacity=0;}
function obj(x){$('obj').textContent=x;$('obj').style.opacity=x?1:0;}

// 音频
let ac=null,rg=null;
function initAudio(){try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  rg=ac.createGain();rg.gain.value=0;rg.connect(ac.destination);const o=ac.createOscillator();o.type='sine';o.frequency.value=42;o.connect(rg);o.start();
  const n=ac.createBufferSource();const b=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate);const d=b.getChannelData(0);let l=0;
  for(let i=0;i<d.length;i++){const w=Math.random()*2-1;d[i]=(l+0.02*w)/1.02;l=d[i];d[i]*=3.3;}n.buffer=b;n.loop=true;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=180;n.connect(f);f.connect(rg);n.start();}
function rumble(v){if(rg)rg.gain.setTargetAtTime(v,ac.currentTime,0.3);}
function crash(){if(!ac)return;const s=ac.createBufferSource(),g=ac.createGain();const b=ac.createBuffer(1,ac.sampleRate*0.6,ac.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);s.buffer=b;s.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.6,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.6);s.start();}

// 流程
$('startBtn').onclick=()=>{initAudio();$('start').style.opacity=0;setTimeout(()=>$('start').style.display='none',400);$('crosshair').style.opacity=1;$('ctrl').style.opacity=1;lockP();loadScene('bedroom');beginBedroom();};
$('retryBtn').onclick=()=>{$('death').style.display='none';loadScene('bedroom');beginBedroom();lockP();};
$('winBtn').onclick=()=>{$('win').style.display='none';loadScene('bedroom');beginBedroom();lockP();};
function beginBedroom(){phase='wake';quakeT=0;hazards=[];wardrobeFell=false;wfAng=0;survived=false;shake=0;
  sub('凌晨 4:12……\n你在睡梦中。');setTimeout(hideSub,2400);
  setTimeout(()=>{phase='calm';sub('… 地面在轻轻震动? …');setTimeout(hideSub,2000);},3000);
  setTimeout(()=>{if(phase==='calm')beginQuake();},6500);}
function beginQuake(){phase='quake';quakeT=0;crash();rumble(0.85);obj('⚠ 地震了!别慌——找地方躲,或冲出房门逃生');}
function die(reason){if(phase==='dead')return;phase='dead';rumble(0.2);if(locked)document.exitPointerLock();
  // 切到死亡演示场景
  clearScene();scene.background=new THREE.Color(0x050505);scene.fog=null;
  try{ deathHandle=buildDeathScene(scene,THREE,reason); }catch(e){ showErr('death:'+e.message); }
  $('deathReason').innerHTML=reason+'<br><b>正确做法:护住头颈,躲到坚固掩护下,别站在高大家具旁</b>';
  $('death').style.display='flex';deathT=0;}
let deathHandle=null,deathT=0;
function win(){phase='won';rumble(0);if(locked)document.exitPointerLock();
  $('winSub').textContent='你从二楼卧室一路逃到了室外。\n记住:地震时护头颈躲掩护、震停后走楼梯远离电梯、远离高大家具和玻璃。';$('win').style.display='flex';}

// 调试钩子
window.__g=()=>({phase,scene:curScene,player:player.toArray().map(v=>+v.toFixed(1))});
window.__dbg=(c,a)=>{ $('start').style.display='none';$('crosshair').style.opacity=1;
  if(c==='scene'){loadScene(a);phase=(a==='bedroom')?'calm':'escape';if(a==='exterior')phase='won';}
  else if(c==='quake'){loadScene('bedroom');beginQuake();}
  composer.render();return 'ok:'+c+' '+curScene;};

// 后处理
const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.4,0.6,0.85));
const Grade={uniforms:{tDiffuse:{value:null},tt:{value:0},r:{value:1.28},s:{value:0.5}},
 vertexShader:`varying vec2 v;void main(){v=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`uniform sampler2D tDiffuse;uniform float tt;uniform float r;uniform float s;varying vec2 v;float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9,78.2)))*43758.5);}void main(){vec2 uv=v;float ca=0.0012;vec4 c;c.r=texture2D(tDiffuse,uv+vec2(ca,0.)).r;c.g=texture2D(tDiffuse,uv).g;c.b=texture2D(tDiffuse,uv-vec2(ca,0.)).b;c.a=1.;float d=distance(uv,vec2(0.5));c.rgb*=smoothstep(r,r-s,d);c.rgb+=(rnd(uv+tt)-0.5)*0.04;gl_FragColor=c;}`};
const grade=new ShaderPass(Grade);composer.addPass(grade);composer.addPass(new OutputPass());

// 危险:坠落物
function spawnHazard(){const hx=player.x+(Math.random()-0.5)*5,hz=player.z+(Math.random()-0.5)*5;
  const warn=new THREE.Mesh(new THREE.RingGeometry(0.4,0.6,18),new THREE.MeshBasicMaterial({color:0xff2010,transparent:true,opacity:.7,side:THREE.DoubleSide}));warn.rotation.x=-Math.PI/2;warn.position.set(hx,0.06,hz);scene.add(warn);
  const obj3=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.3,0.4),M.ceil);obj3.position.set(hx,3,hz);obj3.castShadow=true;scene.add(obj3);
  hazards.push({warn,obj:obj3,hx,hz,t:0,falling:false,vy:0,done:false});}

// 主循环
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);t+=dt;grade.uniforms.tt.value=t;
  const moving=(keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'])&&(phase==='calm'||phase==='quake'||phase==='escape');
  if(moving){const sp=3.2*dt;const e=new THREE.Euler(0,yaw,0,'YXZ');const fwd=new THREE.Vector3(0,0,-1).applyEuler(e),rgt=new THREE.Vector3(1,0,0).applyEuler(e);
    if(keys['KeyW'])player.addScaledVector(fwd,sp);if(keys['KeyS'])player.addScaledVector(fwd,-sp);if(keys['KeyA'])player.addScaledVector(rgt,-sp);if(keys['KeyD'])player.addScaledVector(rgt,sp);}
  // 晃动(轻)
  let tg=phase==='quake'?0.22:0;tg*=moving?1.3:0.7;shake+=(tg-shake)*Math.min(dt*4,1);const s=shake;
  if(phase!=='dead'&&phase!=='won'){
    camera.position.set(player.x+Math.sin(t*37)*0.04*s,EYE+Math.cos(t*43)*0.04*s,player.z+Math.sin(t*29)*0.03*s);
    camera.rotation.order='YXZ';camera.rotation.y=yaw+Math.cos(t*27)*0.012*s;camera.rotation.x=pitch+Math.sin(t*31)*0.012*s;camera.rotation.z=Math.sin(t*53)*0.03*s;
  }
  // 地震玩法(仅卧室)
  if(phase==='quake'){quakeT+=dt;sinceSpawn+=dt;
    if(sinceSpawn>=spawnGap){sinceSpawn=0;spawnHazard();}
    for(const h of hazards){if(h.done)continue;h.t+=dt;
      if(!h.falling){h.warn.material.opacity=0.4+0.4*Math.sin(h.t*12);if(h.t>1.1){h.falling=true;scene.remove(h.warn);}}
      else{h.vy-=dt*16;h.obj.position.y+=h.vy*dt;h.obj.rotation.x+=dt*3;if(h.obj.position.y<=0.2){h.obj.position.y=0.2;h.done=true;crash();if(Math.hypot(player.x-h.hx,player.z-h.hz)<0.85)die('被坠落的天花板碎块砸中。');}}}
    // 衣柜倒
    if(wardrobeHandle&&!wardrobeFell&&quakeT>4){wardrobeFell=true;}
    if(wardrobeFell&&wfAng<Math.PI/2.2){wfAng+=dt*1.4;if(wardrobeHandle.rotation)wardrobeHandle.rotation.z=-wfAng;if(Math.hypot(player.x-2.9,player.z-2.4)<1.5)die('被倒下的大衣柜压住。');}
    // 撑过主震 → 逃生
    if(quakeT>14&&!survived){survived=true;phase='escape';obj('主震暂歇!趁现在逃出去——出门下楼');rumble(0.3);}
  }
  // 出口检测(escape/calm 期可走到出口切场景)
  if(switchCD>0)switchCD-=dt;
  if(switchCD<=0&&(phase==='escape'||phase==='calm'||phase==='quake')){
    const ex=curData&&curData.exit, bk=curData&&curData.back;
    const lbl={stairwell:'楼梯间——小心台阶,往下走',livingroom:'一楼客厅——找到大门冲出去',bedroom:'回到卧室',exterior:''};
    if(ex&&Math.hypot(player.x-ex.x,player.z-ex.z)<ex.r&&SCENES[ex.to]){loadScene(ex.to);phase='escape';obj(lbl[ex.to]||'');hazards=[];}
    else if(bk&&Math.hypot(player.x-bk.x,player.z-bk.z)<bk.r&&SCENES[bk.to]){loadScene(bk.to);phase='escape';obj(lbl[bk.to]||'');hazards=[];}
  }
  // 通关检测(到室外)
  if(curScene==='exterior'&&phase!=='won'){ if(curData.spawn&&player.z<8) win(); }
  // 场景 update 回调
  if(extHandle&&extHandle.update&&curScene==='exterior')try{extHandle.update(dt,t);}catch(e){}
  if(phase==='dead'&&deathHandle&&deathHandle.update){deathT+=dt;try{deathHandle.update(deathT);}catch(e){}
    // 死亡演示相机环绕
    camera.position.set(Math.sin(deathT*0.4)*5,3,Math.cos(deathT*0.4)*5+1);camera.lookAt(0,0.5,0);}
  if(phase==='won'){camera.position.set(0,6,16);camera.lookAt(0,3,0);} // 室外通关镜头
  composer.render();}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
</script>
</body>
