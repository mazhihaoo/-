<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>余震 · DROP — 地震逃生</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
  #app{position:fixed;inset:0;}
  #ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
  .center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;}
  #crosshair{position:fixed;left:50%;top:50%;width:6px;height:6px;margin:-3px;border-radius:50%;background:rgba(255,255,255,.55);z-index:11;opacity:0;transition:opacity .3s;}
  #controls{position:fixed;left:24px;bottom:20px;color:rgba(255,255,255,.5);font-size:14px;line-height:1.7;z-index:11;opacity:0;transition:opacity .5s;text-shadow:0 1px 4px #000;}
  #controls b{color:#fff;}
  #subtitle{color:#e8e2d6;font-size:26px;letter-spacing:4px;line-height:1.8;text-shadow:0 2px 12px #000;opacity:0;transition:opacity 1.2s;max-width:80%;white-space:pre-line;}
  #objective{position:absolute;left:50%;top:8%;transform:translateX(-50%);color:#ffdf5a;font-size:21px;font-weight:700;letter-spacing:1px;text-shadow:0 0 14px #000,0 0 8px #c80;opacity:0;transition:opacity .3s;max-width:84%;text-align:center;}
  #hint{position:absolute;left:50%;top:60%;transform:translateX(-50%);color:#fff;font-size:23px;font-weight:600;text-shadow:0 0 12px #000,0 0 20px #000;opacity:0;transition:opacity .12s;white-space:nowrap;}
  #hint .key{display:inline-block;border:2px solid #fff;border-radius:6px;padding:2px 12px;margin-right:8px;background:rgba(0,0,0,.4);}
  #timer{position:absolute;left:50%;top:15%;transform:translateX(-50%);width:74px;height:74px;opacity:0;transition:opacity .3s;}
  #timer svg{transform:rotate(-90deg);} #timerTrack{stroke:rgba(255,255,255,.12);}
  #timerFill{stroke:#ff3b1f;stroke-linecap:round;filter:drop-shadow(0 0 6px #ff3b1f);}
  #timerNum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:27px;font-weight:700;text-shadow:0 0 10px #ff3b1f;}
  #death{position:fixed;inset:0;background:#000;opacity:0;transition:opacity .25s;z-index:20;pointer-events:none;display:flex;align-items:center;justify-content:center;}
  #deathText{color:#b71a0e;font-size:80px;font-weight:900;letter-spacing:16px;opacity:0;transform:scale(1.4);transition:all .8s;text-shadow:0 0 40px rgba(183,26,14,.6);}
  #safeFlash{position:fixed;inset:0;background:radial-gradient(circle,rgba(60,255,140,0) 30%,rgba(40,255,120,.4) 100%);opacity:0;transition:opacity .12s;z-index:19;pointer-events:none;}
  #safeText{position:fixed;left:50%;top:40%;transform:translate(-50%,-50%) scale(.6);color:#7CFF9B;font-size:60px;font-weight:900;letter-spacing:10px;opacity:0;transition:all .4s;z-index:21;text-shadow:0 0 30px rgba(60,255,140,.7);pointer-events:none;}
  #revealCard{position:fixed;left:50%;bottom:11%;transform:translateX(-50%);width:min(640px,90%);text-align:center;opacity:0;transition:opacity 1s;z-index:21;pointer-events:none;}
  #revealCard .why{color:#ff6a4d;font-size:15px;letter-spacing:2px;margin-bottom:10px;}
  #revealCard .truth{color:#fff;font-size:26px;font-weight:700;line-height:1.5;text-shadow:0 2px 16px #000;}
  #revealCard .correct{color:#7CFF9B;font-size:18px;margin-top:14px;}
  #hook{position:fixed;left:50%;bottom:13%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity .6s;z-index:22;pointer-events:none;}
  #retryBtn{pointer-events:auto;background:linear-gradient(180deg,#d4321e,#8c1d14);color:#fff;border:none;padding:18px 52px;font-size:22px;font-weight:800;letter-spacing:4px;border-radius:12px;cursor:pointer;box-shadow:0 8px 30px rgba(212,50,30,.5);transition:transform .15s;}
  #retryBtn:hover{transform:scale(1.06);}
  #score{color:#cfc8ba;font-size:16px;margin-top:14px;}
  #pause{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:25;display:none;align-items:center;justify-content:center;color:#fff;font-size:22px;letter-spacing:3px;cursor:pointer;}
  #start{position:fixed;inset:0;background:#0a0908;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
  #start h1{color:#e8e2d6;font-size:60px;letter-spacing:18px;font-weight:900;}
  #start .sub{color:#7a7468;font-size:16px;letter-spacing:3px;}
  #startBtn{background:none;border:1px solid #6a4;color:#9c6;padding:15px 46px;font-size:20px;letter-spacing:6px;border-radius:8px;cursor:pointer;transition:all .2s;}
  #startBtn:hover{background:#9c6;color:#0a0908;}
  .hint2{color:#555;font-size:13px;line-height:1.8;text-align:center;}
</style>
<script>
// 错误捕获：任何 JS 错误显示到屏幕红条，方便隔空 debug
function showErr(m){var b=document.getElementById('errbox');if(!b){b=document.createElement('div');b.id='errbox';b.style.cssText='position:fixed;left:0;right:0;top:0;z-index:99999;background:#a00;color:#fff;font:13px monospace;padding:10px;white-space:pre-wrap;';(document.body||document.documentElement).appendChild(b);}b.textContent+='❌ '+m+'\n';}
addEventListener('error',e=>showErr((e.message||(e.target&&e.target.src)||'加载失败')+' @'+String(e.filename||(e.target&&e.target.src)||'').split('/').pop()+':'+(e.lineno||'')),true);
addEventListener('unhandledrejection',e=>showErr('Promise: '+(e.reason&&e.reason.message||e.reason)));
</script>
</head>
<body>
<div id="app"></div>
<div id="crosshair"></div>
<div id="ui">
  <div id="subtitle" class="center"></div>
  <div id="objective"></div>
  <div id="hint"></div>
  <div id="timer"><svg width="74" height="74"><circle id="timerTrack" cx="37" cy="37" r="31" fill="none" stroke-width="6"/><circle id="timerFill" cx="37" cy="37" r="31" fill="none" stroke-width="6"/></svg><div id="timerNum"></div></div>
</div>
<div id="controls"><b>WASD</b> 走动　·　<b>鼠标</b> 环顾　·　<b>E</b> 在某处躲避</div>
<div id="safeFlash"></div><div id="safeText">SAFE</div>
<div id="death"><div id="deathText">你 死 了</div></div>
<div id="revealCard"><div class="why">— 为什么？—</div><div class="truth"></div><div class="correct"></div></div>
<div id="hook"><button id="retryBtn">再 来 一 次</button><div id="score"></div></div>
<div id="pause">已暂停　·　点击屏幕继续</div>
<div id="start"><h1>DROP</h1><div class="sub">余 震 · 地 震 逃 生</div><button id="startBtn">▶ 进 入</button><div class="hint2">建议戴耳机 · 进入后 WASD 走动、鼠标环顾<br>地震来时，走到你认为安全的地方按 E 躲避</div></div>

<script type="importmap">
{ "imports": { "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" }}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ============================================================
// 余震·DROP —— 第一人称地震逃生抉择 demo（回正版）
// 玩家走到空间里不同地点、按E确认=做抉择。错→你死了→镜头拉出揭示原因→再来。
// 几何体全代码画、声音全代码合成，零图片零音频文件（守8MB红线）。
// ============================================================
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0; app.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x0a0806,0.04);
const camera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,0.1,100);

const ambient=new THREE.AmbientLight(0xffe6c0,0.55); scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffd9a0,1.4); sun.position.set(-6,8,4); scene.add(sun);
const ceil=new THREE.PointLight(0xfff0d0,0.7,24); ceil.position.set(0,2.7,0); scene.add(ceil);

// ---- 办公室（低模+细节）----
const room=new THREE.Group(); scene.add(room);
const mF=new THREE.MeshStandardMaterial({color:0x3a332b,roughness:.9});
const mC=new THREE.MeshStandardMaterial({color:0x4a4458,roughness:1});
const mW=new THREE.MeshStandardMaterial({color:0x6b6258,roughness:.95});
const mD=new THREE.MeshStandardMaterial({color:0x8a6b4a,roughness:.7});
const mM=new THREE.MeshStandardMaterial({color:0x9aa0a6,roughness:.4,metalness:.6});
function box(w,h,d,m,x,y,z,g){const e=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);e.position.set(x,y,z);(g||room).add(e);return e;}
box(16,0.2,16,mF,0,0,0); box(7,0.02,7,mC,0,0.11,0); box(16,0.2,16,mW,0,3,0);
box(16,3,0.3,mW,0,1.5,-8); box(0.3,3,16,mW,-8,1.5,0); box(16,3,0.3,mW,0,1.5,8);
const winMat=new THREE.MeshStandardMaterial({color:0x9fd4ff,roughness:.05,metalness:.2,transparent:true,opacity:.32});
const windowPane=box(0.2,3,16,winMat,8,1.5,0);
for(let i=-1;i<=1;i++) box(0.3,0.06,6,new THREE.MeshStandardMaterial({color:0xfff4e0,emissive:0xffe9c0,emissiveIntensity:1.1}),i*4,2.92,0);
[0xc24,0x2a6,0x46c].forEach((c,i)=>box(1.2,0.9,0.05,new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.15}),-3+i*3,1.8,-7.8));
box(3,1.2,0.08,new THREE.MeshStandardMaterial({color:0x55617a,roughness:.8}),-1.5,0.7,1.6);
box(0.3,0.6,0.3,mM,6,0.4,-6); const crown=new THREE.Mesh(new THREE.IcosahedronGeometry(0.7,0),new THREE.MeshStandardMaterial({color:0x3f7d4a,roughness:.8})); crown.position.set(6,1.1,-6); room.add(crown);

// ---- 抉择点（统一交互：靠近显示[E]+物体微光，按E确认）----
// 桌子=正确(SURVIVE)，其余=致命(DEATH)。地震时所有点淡淡发光提示"可躲"，不点破对错。
const choices=[]; // {name,obj,pos,prompt,result,cause,truth}
function addChoice(name,obj,prompt,result,truth){ choices.push({name,obj,pos:obj.position.clone(),prompt,result,truth,base:obj.material.emissive?obj.material.emissive.clone():null}); }
// 4 张桌子（正确答案）
const tables=[];
for(let i=0;i<2;i++)for(let j=0;j<2;j++){ const x=-3+j*6, z=-3.5+i*5;
  const top=box(2.4,0.12,1.2,new THREE.MeshStandardMaterial({color:0x8a6b4a,roughness:.7,emissive:0x000000}),x,1.0,z);
  box(0.1,1,0.1,mD,x-1.1,0.5,z-0.5); box(0.1,1,0.1,mD,x+1.1,0.5,z+0.5); box(0.7,0.45,0.06,mM,x,1.4,z-0.3);
  top.position.set(x,1.0,z); tables.push(top); addChoice('桌'+i+j,top,'钻到桌下抓牢','SURVIVE','趴下 → 钻到坚固桌下护住头颈 → 抓牢（Drop·Cover·Hold On）'); }
// 楼梯口（绿色EXIT，本能陷阱）
const exitBox=box(1.6,0.9,0.15,new THREE.MeshStandardMaterial({color:0x18d018,emissive:0x18ff18,emissiveIntensity:1.3}),-7.0,2.3,7.6);
box(1.6,2.4,0.2,new THREE.MeshStandardMaterial({color:0x223,roughness:.6}),-7.0,1.2,7.7);
const stair=box(1.5,2.0,1.0,new THREE.MeshStandardMaterial({color:0x3a4a3a,roughness:.8,emissive:0x000000}),-7.0,1.0,6.6); stair.material.transparent=true; stair.material.opacity=0.01;
addChoice('楼梯',stair,'冲下楼梯逃命','DEATH','地震时往楼梯/楼下跑，是死亡率最高的选择。');
// 电梯
const elevator=box(0.25,2.6,2.6,new THREE.MeshStandardMaterial({color:0x556070,metalness:.7,roughness:.3,emissive:0x000000}),7.8,1.3,6.5);
addChoice('电梯',elevator,'挤进电梯下楼','DEATH','地震会瞬间断电，把你困死在电梯井里。');
// 门框
const door=box(1.4,2.4,0.4,new THREE.MeshStandardMaterial({color:0x5a5048,roughness:.8,emissive:0x000000}),2.8,1.2,7.6); door.material.transparent=true; door.material.opacity=0.35;
box(0.3,2.4,0.3,mW,2.0,1.2,7.7); box(0.3,2.4,0.3,mW,3.6,1.2,7.7); box(1.6,0.3,0.3,mW,2.8,2.4,7.7);
addChoice('门框',door,'躲到门框下','DEATH','现代门框不比墙结实，挡不住要命的飞落物。');
// 窗边
const winZone=box(1.0,2.6,3.0,new THREE.MeshStandardMaterial({color:0x9fd4ff,roughness:.1,emissive:0x000000}),7.2,1.3,0); winZone.material.transparent=true; winZone.material.opacity=0.01;
addChoice('窗边',winZone,'躲到窗边墙角','DEATH','地震会震碎玻璃幕墙，飞溅的碎玻璃能致命。');

// 掉落碎块
const debris=[]; for(let i=0;i<16;i++){ const d=box(0.3+Math.random()*0.4,0.2,0.3+Math.random()*0.4,mW,(Math.random()-0.5)*14,2.9,(Math.random()-0.5)*14); d.visible=false; d.userData.vy=0; debris.push(d); }
// 红圈（揭示时圈玩家位置）
const ring=new THREE.Mesh(new THREE.TorusGeometry(1.0,0.08,8,32),new THREE.MeshBasicMaterial({color:0xff2b14})); ring.rotation.x=Math.PI/2; ring.visible=false; scene.add(ring);

// ---- 后处理 ----
const composer=new EffectComposer(renderer); composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.5,0.5,0.85));
const Vig={uniforms:{tDiffuse:{value:null},radius:{value:0.9},softness:{value:0.6},redPulse:{value:0.0}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float radius;uniform float softness;uniform float redPulse;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);float d=distance(vUv,vec2(0.5));float v=smoothstep(radius,radius-softness,d);c.rgb*=v;c.rgb+=vec3(redPulse,0.0,0.0)*(1.0-v);gl_FragColor=c;}`};
const vignette=new ShaderPass(Vig); composer.addPass(vignette); composer.addPass(new OutputPass());

// ---- WebAudio 合成 ----
let ac=null,rg=null,heart=null;
function initAudio(){ try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  rg=ac.createGain(); rg.gain.value=0; rg.connect(ac.destination);
  const o=ac.createOscillator(); o.type='sine'; o.frequency.value=42; o.connect(rg); o.start();
  const n=ac.createBufferSource(); const b=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate); const d=b.getChannelData(0); let l=0;
  for(let i=0;i<d.length;i++){const w=Math.random()*2-1;d[i]=(l+0.02*w)/1.02;l=d[i];d[i]*=3.4;}
  n.buffer=b; n.loop=true; const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=180; n.connect(f); f.connect(rg); n.start(); }
function setRumble(v){ if(rg)rg.gain.setTargetAtTime(v,ac.currentTime,0.3); }
function heartbeat(r){ if(heart)clearInterval(heart); if(!ac)return; const beat=()=>{[0,0.17].forEach((dt,i)=>{const t=ac.currentTime+dt;const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=i?42:55;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);o.start(t);o.stop(t+0.25);});}; beat(); heart=setInterval(beat,r); }
function stopHeart(){ if(heart){clearInterval(heart);heart=null;} }
function crash(){ if(!ac)return; const s=ac.createBufferSource(),g=ac.createGain();const b=ac.createBuffer(1,ac.sampleRate*0.6,ac.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);s.buffer=b;s.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.7,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.6);s.start(); }
function thud(){ if(!ac)return; const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(420,ac.currentTime);o.frequency.exponentialRampToValueAtTime(120,ac.currentTime+0.15);o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.5,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);o.start();o.stop(ac.currentTime+0.3); }

// ---- 状态机 ----
const EYE_Y=1.6, CROUCH_Y=0.85;
let phase='start', outcome='', t=0, shake=0, viewRadius=0.9, timeLeft=0, level=1, score=0, deaths=0, camY=EYE_Y;
let best=+(localStorage.getItem('drop_best')||0);
const clock=new THREE.Clock(); const playerPos=new THREE.Vector3(0,EYE_Y,4);
let yaw=0,pitch=0,locked=false; const keys={}; let near=null; let pendingTruth='',pendingCorrect='',pendingObj=null,revealStart=-999; const topView=new THREE.Vector3();
const TIME_BASE=10;
const $=id=>document.getElementById(id);
function timeLimit(){ return Math.max(5, TIME_BASE - (level-1)*1.2); }

renderer.domElement.addEventListener('click',()=>{ if(phase!=='start'&&phase!=='hook'&&!locked) renderer.domElement.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ locked=(document.pointerLockElement===renderer.domElement); $('pause').style.display=(!locked&&(phase==='calm'||phase==='action'))?'flex':'none'; });
document.addEventListener('mousemove',e=>{ if(!locked)return; yaw-=e.movementX*0.0022; pitch-=e.movementY*0.0022; pitch=Math.max(-1.4,Math.min(1.4,pitch)); });
$('pause').addEventListener('click',()=>renderer.domElement.requestPointerLock());
addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='KeyE') tryPick(); });
addEventListener('keyup',e=>{ keys[e.code]=false; });

function sub(x){ $('subtitle').textContent=x; $('subtitle').style.opacity=1; } function hideSub(){ $('subtitle').style.opacity=0; }

$('startBtn').onclick=()=>{ initAudio(); $('start').style.opacity=0; setTimeout(()=>$('start').style.display='none',400); renderer.domElement.requestPointerLock(); beginIntro(); };
$('retryBtn').onclick=()=>{ if(outcome==='survive') level++; resetRound(); };

function beginIntro(){ phase='intro'; camY=EYE_Y; viewRadius=0.9; $('crosshair').style.opacity=1; $('controls').style.opacity=1;
  sub('下午 2:28　你在 20 楼　第 '+level+' 层'); setTimeout(hideSub,2400); setTimeout(beginCalm,3000); }
function beginCalm(){ phase='calm'; sub('… 走动看看，一切如常 …'); setTimeout(hideSub,2000); setRumble(0); setTimeout(beginQuake,3800); }
function beginQuake(){ phase='action'; outcome=''; timeLeft=timeLimit();
  crash(); setRumble(0.9); heartbeat(600); debris.forEach(d=>{d.visible=true;d.userData.vy=0;}); windowPane.material.opacity=0.12;
  // 含蓄引导：不点破对错，只提示"该躲了/想想往哪"
  $('objective').textContent = deaths>0 ? '⚠ 又震了！想想——往外跑，还是躲起来？走到你觉得安全的地方按 E' : '⚠ 地震了！快走到一个地方躲起来——按 E 躲避';
  $('objective').style.opacity=1; $('timer').style.opacity=1; }
function tryPick(){ if(phase==='action'&&near){ const c=near; endAction(); if(c.result==='SURVIVE') survive(); else die(c); } }
function endAction(){ $('objective').style.opacity=0; $('timer').style.opacity=0; $('hint').style.opacity=0; choices.forEach(c=>{if(c.obj.material.emissive)c.obj.material.emissive.setHex(0x000000);}); if(locked)document.exitPointerLock(); }

function die(c){ phase='death'; outcome='death'; deaths++; score=Math.max(0,Math.floor((timeLeft/timeLimit())*100))+(level-1)*100;
  crash(); setRumble(1.0); shake=1.2; ring.position.set(playerPos.x,0.15,playerPos.z); pendingTruth=c.truth; pendingCorrect=''; pendingObj=c.obj;
  $('death').style.opacity=1; setTimeout(()=>{$('deathText').style.opacity=1;$('deathText').style.transform='scale(1)';},120);
  heartbeat(1100); setRumble(0.25); setTimeout(()=>heartbeat(1700),1600); setTimeout(beginReveal,3600); }
function beginReveal(){ phase='reveal'; stopHeart(); setRumble(0.08);
  $('deathText').style.opacity=0; $('deathText').style.transform='scale(1.4)'; $('death').style.opacity=0; debris.forEach(d=>d.visible=false); ring.visible=true;
  if(pendingObj&&pendingObj.material.emissive) pendingObj.userData.flash=true;
  revealStart=t; topView.set(playerPos.x,15,playerPos.z+0.01);
  setTimeout(()=>{ document.querySelector('#revealCard .truth').textContent=pendingTruth; document.querySelector('#revealCard .correct').textContent='正确做法：趴下 → 钻到坚固桌下护住头颈 → 抓牢'; $('revealCard').style.opacity=1; },1400);
  setTimeout(()=>{ if(score>best){best=score;localStorage.setItem('drop_best',best);} $('score').textContent='本局 '+score+' 分　|　历史最高 '+best+' 分'; $('retryBtn').textContent='再 来 一 次（这次躲桌下）'; $('hook').style.opacity=1; phase='hook'; },2800); }
function survive(){ phase='survived'; outcome='survive'; thud(); stopHeart(); setRumble(0.15);
  $('safeFlash').style.opacity=1; setTimeout(()=>$('safeFlash').style.opacity=0,180);
  $('safeText').style.opacity=1; $('safeText').style.transform='translate(-50%,-50%) scale(1)'; camY=CROUCH_Y;
  setTimeout(()=>{ $('safeText').style.opacity=0; $('safeText').style.transform='translate(-50%,-50%) scale(.6)'; sub('✅ 你活了下来。\n趴下·掩护·抓牢——你做对了。'); },1100);
  setTimeout(()=>{ score=200+Math.floor((timeLeft/timeLimit())*100)+(level-1)*100; if(score>best){best=score;localStorage.setItem('drop_best',best);} $('score').textContent='本局 '+score+' 分　|　历史最高 '+best+' 分'; $('retryBtn').textContent='进入第 '+(level+1)+' 层 ▲'; $('hook').style.opacity=1; phase='hook'; },2400); }

function resetRound(){ $('hook').style.opacity=0; $('revealCard').style.opacity=0; $('retryBtn').textContent='再 来 一 次'; hideSub(); $('safeText').style.opacity=0;
  ring.visible=false; windowPane.material.opacity=0.32; choices.forEach(c=>{c.obj.userData.flash=false;}); pendingObj=null;
  playerPos.set(0,EYE_Y,4); yaw=0; pitch=0; shake=0; viewRadius=0.9; camY=EYE_Y; vignette.uniforms.redPulse.value=0; setRumble(0); stopHeart();
  renderer.domElement.requestPointerLock(); beginIntro(); }

// 调试钩子（CDP 自验证用，开发期）
window.__g=()=>({phase,level,score,deaths,near:near&&near.name,playerPos:playerPos.toArray().map(v=>+v.toFixed(1))});
window.__dbg=(cmd,arg)=>{ if(cmd==='quake'){$('start').style.display='none';beginQuake();}
  else if(cmd==='goto'){const c=choices.find(x=>x.name.startsWith(arg));if(c){playerPos.set(c.pos.x,EYE_Y,c.pos.z+ (c.pos.z>0?-1.5:1.5));}}
  else if(cmd==='pick'){const c=choices.find(x=>x.name.startsWith(arg));if(c){near=c;tryPick();}}
  else if(cmd==='reveal'){phase='reveal';outcome='death';ring.visible=true;ring.position.set(playerPos.x,0.15,playerPos.z);revealStart=t-3;topView.set(playerPos.x,15,playerPos.z+0.01);camera.position.set(playerPos.x,15,playerPos.z+0.01);camera.lookAt(playerPos.x,0,playerPos.z);document.querySelector('#revealCard .truth').textContent='地震时往楼梯/楼下跑，是死亡率最高的选择。';document.querySelector('#revealCard .correct').textContent='正确做法：趴下 → 钻到坚固桌下护住头颈 → 抓牢';$('revealCard').style.opacity=1;}
  composer.render(); return 'ok:'+cmd; };

function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); t+=dt;
  const moving=(keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'])&&(phase==='calm'||phase==='action');
  if(moving){ const sp=3.4*dt; const e=new THREE.Euler(0,yaw,0,'YXZ'); const fwd=new THREE.Vector3(0,0,-1).applyEuler(e),rgt=new THREE.Vector3(1,0,0).applyEuler(e);
    if(keys['KeyW'])playerPos.addScaledVector(fwd,sp); if(keys['KeyS'])playerPos.addScaledVector(fwd,-sp); if(keys['KeyA'])playerPos.addScaledVector(rgt,-sp); if(keys['KeyD'])playerPos.addScaledVector(rgt,sp);
    playerPos.x=Math.max(-7.4,Math.min(7.4,playerPos.x)); playerPos.z=Math.max(-7.4,Math.min(7.4,playerPos.z)); }
  // 晕翻转：站定更稳更清晰，乱跑才晃（教"地震别瞎跑、先看清"）
  let tg=phase==='action'?0.7:phase==='death'?1.2:0; tg*=moving?1.5:0.6; shake+=(tg-shake)*Math.min(dt*4,1); const s=shake;
  const ty=(phase==='survived'||(phase==='hook'&&outcome==='survive'))?CROUCH_Y:EYE_Y; camY+=(ty-camY)*Math.min(dt*5,1);
  const deathView=(phase==='reveal'||(phase==='hook'&&outcome==='death'));
  if(!deathView){ camera.position.set(playerPos.x+Math.sin(t*37)*0.05*s,camY+Math.cos(t*43)*0.045*s,playerPos.z+Math.sin(t*29)*0.04*s);
    camera.rotation.order='YXZ'; camera.rotation.y=yaw+Math.cos(t*27)*0.015*s; camera.rotation.x=pitch+Math.sin(t*31)*0.015*s; camera.rotation.z=Math.sin(t*53)*0.04*s; }
  if(phase==='action'||phase==='death') ceil.intensity=Math.random()<0.12?0.1:0.7*(1-0.3*s); else if(deathView) ceil.intensity=1.2; else ceil.intensity=0.7;
  if(phase==='action'||phase==='death') debris.forEach(d=>{if(d.visible){d.userData.vy-=dt*9;d.position.y+=d.userData.vy*dt;d.rotation.x+=dt*2;d.rotation.z+=dt*3;if(d.position.y<0.1){d.position.y=0.1;d.userData.vy*=-0.3;}}});

  if(phase==='action'){
    // 所有抉择点淡淡发光(提示可躲,不点破对错)；最近的高亮+显示[E]
    near=null; let bd=2.2;
    for(const c of choices){ if(c.obj.material.emissive)c.obj.material.emissive.setHex(0x1a1a22); const d=Math.hypot(playerPos.x-c.pos.x,playerPos.z-c.pos.z); if(d<bd){bd=d;near=c;} }
    if(near){ if(near.obj.material.emissive)near.obj.material.emissive.setRGB(0.0,0.45+0.2*Math.sin(t*6),0.6+0.2*Math.sin(t*6)); $('hint').innerHTML='<span class="key">E</span>'+near.prompt; $('hint').style.opacity=1; } else $('hint').style.opacity=0;
    timeLeft-=dt; const frac=Math.max(0,timeLeft/timeLimit()); const C=2*Math.PI*31;
    $('timerFill').style.strokeDasharray=C; $('timerFill').style.strokeDashoffset=C*(1-frac); $('timerNum').textContent=Math.ceil(Math.max(0,timeLeft));
    viewRadius=0.9-(1-frac)*0.45; vignette.uniforms.redPulse.value=(1-frac)*0.25*(0.6+0.4*Math.sin(t*12));
    if(timeLeft<=0){ endAction(); die({truth:'地震中愣住犹豫，本身就是致命的。',obj:null}); }
  } else { viewRadius+=((phase==='death'?0.25:0.9)-viewRadius)*Math.min(dt*2,1); vignette.uniforms.redPulse.value*=(1-Math.min(dt*3,1)); }
  vignette.uniforms.radius.value=viewRadius;

  if(deathView){ const k=Math.min((t-revealStart)/2.5,1),e=k*k*(3-2*k); const ep=new THREE.Vector3(playerPos.x,EYE_Y,playerPos.z); camera.position.lerpVectors(ep,topView,e); camera.lookAt(playerPos.x,0,playerPos.z);
    ring.scale.setScalar(1+0.12*Math.sin(t*4)); ring.material.color.setHSL(0,1,0.4+0.15*Math.sin(t*6));
    if(pendingObj&&pendingObj.userData.flash&&pendingObj.material.emissive) pendingObj.material.emissive.setHSL(0,1,0.3+0.25*Math.sin(t*8)); }
  composer.render();
}
animate();
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); });
</script>
