<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>核心技术验证 · 射线地面跟随 + 墙碰撞</title>
<style>*{margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"PingFang SC",sans-serif}#app{position:fixed;inset:0}
#hud{position:fixed;left:50%;top:8%;transform:translateX(-50%);color:#ffdf5a;font-size:18px;font-weight:700;text-shadow:0 0 12px #000;z-index:10;text-align:center}
#info{position:fixed;left:16px;bottom:16px;color:#9cf;font-size:13px;font-family:monospace;z-index:10;text-shadow:0 1px 3px #000;line-height:1.5}
#cross{position:fixed;left:50%;top:50%;width:6px;height:6px;margin:-3px;border-radius:50%;background:rgba(255,255,255,.6);z-index:11}
#start{position:fixed;inset:0;background:#0a0908;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;color:#9c6}
#start button{background:none;border:1px solid #6a4;color:#9c6;padding:14px 40px;font-size:18px;letter-spacing:4px;border-radius:8px;cursor:pointer}
#start p{color:#888;font-size:14px;line-height:1.8;text-align:center;max-width:560px}</style>
</head><body>
<div id="app"></div><div id="cross"></div>
<div id="hud">核心技术验证：从上层平台走下楼梯 → 撞前方的墙</div>
<div id="info"></div>
<div id="start"><h2>射线地面跟随 + 墙碰撞 测试</h2>
<p>验证两件事：<br>① <b>走下楼梯时,视角高度会不会跟着台阶一级级降</b>(真实下楼)<br>② <b>走到墙前,会不会被挡住、穿不过去</b>(迷宫的前提)<br><br>WASD 走动 · 鼠标环顾 · 从上层平台往前走下楼梯,再去撞那面砖墙</p>
<button id="b">▶ 开始测试</button></div>
<script type="importmap">{ "imports": { "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" }}</script>
<script type="module">
import * as THREE from 'three';
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;app.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x717880);scene.fog=new THREE.Fog(0x666e77,8,40);
const camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,0.05,100);
scene.add(new THREE.AmbientLight(0xaab2bc,0.5));
const sun=new THREE.DirectionalLight(0xdce6f0,1.4);sun.position.set(6,12,4);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);sun.shadow.camera.left=-20;sun.shadow.camera.right=20;sun.shadow.camera.top=20;sun.shadow.camera.bottom=-20;scene.add(sun);
const lamp=new THREE.PointLight(0xffd9a0,4,12,2);lamp.position.set(0,4,2);scene.add(lamp); // 暖光(学卧室)

const mFloor=new THREE.MeshStandardMaterial({color:0x8a857d,roughness:.9});
const mStep=new THREE.MeshStandardMaterial({color:0x9a9994,roughness:.95});
const mWall=new THREE.MeshStandardMaterial({color:0xc24,roughness:.9}); // 砖红墙(醒目)
const mWall2=new THREE.MeshStandardMaterial({color:0xbab8b2,roughness:.95});

// ===== 地面/台阶(grounds:射线地面跟随检测这些) =====
const grounds=[], walls=[];
function ground(w,h,d,m,x,y,z){const e=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);e.position.set(x,y,z);e.receiveShadow=true;scene.add(e);grounds.push(e);return e;}
function wall(w,h,d,m,x,y,z){const e=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);e.position.set(x,y,z);e.castShadow=e.receiveShadow=true;scene.add(e);walls.push(e);return e;}

// 上层平台(y顶面=3)
ground(8,0.4,5,mFloor,0,2.8,4);           // 顶面 y=3.0
// 下行楼梯:8级,从 y=3 降到 y=0(每级降0.375,进深0.4)
const N=8,RISE=0.375,RUN=0.5;
for(let i=0;i<N;i++){ const topY=3-(i+1)*RISE; const z=1.2-i*RUN;
  ground(8,0.3,RUN+0.02,mStep,0,topY-0.15,z); }   // 台阶踏面顶=topY
// 下层平台(y顶面=0)
ground(8,0.4,6,mFloor,0,-0.2,-3.5);        // 顶面 y=0
// 墙(walls:碰撞检测) —— 砖红墙挡在下层
wall(6,3,0.4,mWall,0,1.3,-6.2);            // 正前砖墙
wall(0.4,3,12,mWall2,-4,1.3,0);            // 左墙
wall(0.4,3,12,mWall2,4,1.3,0);             // 右墙

// ===== 第一人称 + 射线地面跟随 + 墙碰撞 =====
const EYE=1.6;
let player=new THREE.Vector3(0,3+EYE,5);   // 上层平台起步
let yaw=0,pitch=-0.28,locked=false;const keys={};
const downRay=new THREE.Raycaster(); const wallRay=new THREE.Raycaster();
renderer.domElement.addEventListener('click',()=>{if(!locked)renderer.domElement.requestPointerLock&&renderer.domElement.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>locked=document.pointerLockElement===renderer.domElement);
document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*0.0022;pitch-=e.movementY*0.0022;pitch=Math.max(-1.3,Math.min(1.3,pitch));});
addEventListener('keydown',e=>keys[e.code]=true);addEventListener('keyup',e=>keys[e.code]=false);
document.getElementById('b').onclick=()=>{document.getElementById('start').style.display='none';renderer.domElement.requestPointerLock&&renderer.domElement.requestPointerLock();};

// 墙碰撞:朝移动方向发短射线,有墙就不走那个分量
function canMove(from,to){
  const dir=new THREE.Vector3().subVectors(to,from); const dist=dir.length(); if(dist<1e-5)return true; dir.normalize();
  wallRay.set(new THREE.Vector3(from.x,from.y-0.7,from.z),dir); wallRay.far=dist+0.3;
  return wallRay.intersectObjects(walls,false).length===0;
}
const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);
  // 移动(分轴,各自做墙碰撞)
  const moving=keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'];
  if(moving){const sp=3*dt;const e=new THREE.Euler(0,yaw,0,'YXZ');const fwd=new THREE.Vector3(0,0,-1).applyEuler(e),rgt=new THREE.Vector3(1,0,0).applyEuler(e);
    let mv=new THREE.Vector3();
    if(keys['KeyW'])mv.add(fwd);if(keys['KeyS'])mv.sub(fwd);if(keys['KeyA'])mv.sub(rgt);if(keys['KeyD'])mv.add(rgt);
    if(mv.lengthSq()>0){mv.normalize().multiplyScalar(sp);
      const tx=new THREE.Vector3(player.x+mv.x,player.y,player.z); if(canMove(player,tx))player.x=tx.x;
      const tz=new THREE.Vector3(player.x,player.y,player.z+mv.z); if(canMove(player,tz))player.z=tz.z;
    }}
  // 射线地面跟随:从头顶向下,踩到哪个面,眼高就贴上去
  downRay.set(new THREE.Vector3(player.x,player.y+1.5,player.z),new THREE.Vector3(0,-1,0));downRay.far=8;
  const hit=downRay.intersectObjects(grounds,false);
  if(hit.length){const groundY=hit[0].point.y; player.y += (groundY+EYE - player.y)*Math.min(dt*12,1);} // 平滑贴地,走楼梯y自然降
  // 相机
  camera.position.copy(player);camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
  document.getElementById('info').textContent='玩家 y(高度)='+player.y.toFixed(2)+'  (上层≈4.6, 走下楼梯应降到≈1.6)\n脚下地面 y='+(hit.length?hit[0].point.y.toFixed(2):'无');
  renderer.render(scene,camera);}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script></body></html>
